<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>页面未找到 · 70NYC</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/style.css?v=4" />
  <style>
    .error-page {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 40px 24px;
      background: linear-gradient(165deg, #0a0a0a 0%, #141210 50%, #0a0a0a 100%);
      color: var(--white);
      text-align: center;
    }
    .error-card {
      max-width: 520px;
    }
    .error-code {
      font-size: clamp(72px, 14vw, 120px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -4px;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0 0 12px;
    }
    .error-card h1 {
      margin: 0 0 12px;
      font-size: clamp(24px, 4vw, 32px);
      font-weight: 900;
    }
    .error-card p {
      margin: 0 0 28px;
      color: rgba(255, 255, 255, 0.55);
      line-height: 1.7;
      font-size: 15px;
    }
    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <main class="error-page">
    <div class="error-card">
      <p class="error-code">404</p>
      <h1>页面未找到</h1>
      <p>您访问的页面不存在或已移动。<br>Page not found — the link may be broken or outdated.</p>
      <div class="error-actions">
        <a class="btn btn-primary" href="/">返回首页</a>
        <a class="btn btn-ghost" href="/en/">English Home</a>
        <a class="btn btn-ghost" href="/contact/">联系我们</a>
      </div>
    </div>
  </main>
</body>
</html>
